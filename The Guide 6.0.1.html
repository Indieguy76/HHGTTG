<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Hitchhiker's Guide to the Galaxy</title>
    <style>
        :root {
            --guide-green: #00ff41;
            --guide-bg: #0a0a0a;
            --panic-red: #ff0000;
        }

        body {
            background-color: #1a1a1a;
            color: var(--guide-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
        }

     #guide-unit {
    width: 95vw;
    max-width: 420px;
    /* dvh adapts to the mobile browser's address bar automatically */
    height: calc(100dvh - 15px - env(safe-area-inset-bottom)); 
    margin-top: 5px; 
    margin-bottom: env(safe-area-inset-bottom);
    background-color: var(--guide-bg);
    border: 3px solid #333;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

        header {
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid var(--guide-green);
            background: #050505;
        }

        h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1.5px; }

        #search-container { 
            padding: 6px; 
            display: flex; 
            gap: 6px;
            position: relative; 
        }
	
	#search-container input::placeholder {
    	color: #00ff41;
    	opacity: 1;
}

        #clear-btn {
    background: #000;
    border: 1px solid var(--guide-green);
    color: var(--guide-green);
    padding: 5px 15px;
    font-family: 'Courier New', Courier, monospace;
    cursor: pointer;
    font-weight: bold;
}

        #clear-btn:active {
    background: var(--guide-green);
    color: #000;
}

        input {
            flex-grow: 1;
            padding: 10px;
            background: #000;
            border: 1px solid var(--guide-green);
            color: var(--guide-green);
            font-size: 1rem;
            outline: none;
            border-radius: 0;
            -webkit-appearance: none;
        }

        #voice-btn {
            background: #000;
            border: 1px solid var(--guide-green);
            color: var(--guide-green);
            padding: 5px 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .voice-on { background: var(--guide-green) !important; color: #000 !important; }

        #suggestions {
            position: absolute;
            top: 55px;
            left: 10px;
            width: calc(100% - 20px);
            background: #000;
            border: 1px solid var(--guide-green);
            z-index: 100;
            display: none;
            max-height: 180px;
            overflow-y: auto;
        }

        .suggestion-item { padding: 12px; border-bottom: 1px solid #111; text-transform: uppercase; cursor: pointer; font-size: 0.9rem; }

        #display-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .entry-title { 
            font-size: 1.4rem; 
            text-decoration: underline; 
            margin-bottom: 12px; 
            color: var(--guide-green); 
            text-transform: uppercase; 
        }

	@keyframes shake {
  	10%, 90% { transform: translate3d(-1px, 0, 0); }
  	20%, 80% { transform: translate3d(2px, 0, 0); }
  	30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  	40%, 60% { transform: translate3d(4px, 0, 0); }
	}

	.guide-button {
    	/* Your existing button styles here */
   	 border: 1px solid var(--guide-green);
    	background: transparent;
    	color: var(--guide-green);
    	padding: 10px;
    	text-transform: uppercase;
	}

        /* Slower, more readable pulse */
	.flashing { 
    	    animation: blink 3s infinite; 
	}

	@keyframes blink { 
    	    0%, 100% { opacity: 1; } 
    	    50% { opacity: 0.3; } 
	}

/* New jitter animation for the whole unit */
	.glitch-unit {
    	    animation: jitter-screen 0.6s infinite;
	}

	@keyframes jitter-screen {
    	   0% { transform: translate(0,0); }
    	   25% { transform: translate(1px, -1px); filter: contrast(1.2); }
    	   50% { transform: translate(-1px, 1px); }
    	   75% { transform: translate(1px, 1px); filter: contrast(0.9); }
    	   100% { transform: translate(0,0); }
}

        .big-text {
            font-size: 4.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: 40px;
            line-height: 1.2;
        }

        .panic-color { color: var(--panic-red); }
        .enjoy-color { color: var(--guide-green); }

        .thumb-logo {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            display: block;
            fill: var(--guide-green);
        }

      .footer-nav {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    /* Increased the bottom buffer slightly */
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--guide-green);
    background: #050505;
}

        .nav-btn {
            background: none;
            border: 1px solid var(--guide-green);
            color: var(--guide-green);
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .nav-btn:active { background: var(--guide-green); color: #000; }

	#top-nav {
    	padding: 10px;
    	border-bottom: 1px solid var(--guide-green);
    	display: flex;
    	align-items: center;
	}

	#volume-selector {
    	background: black;
    	color: var(--guide-green);
    	border: 1px solid var(--guide-green);
    	font-family: inherit;
    	padding: 5px;
    	flex-grow: 1;
    	margin-left: 10px;
	}

	#emergency-kit {
    		display: none; 
    		position: absolute; 
    		bottom: 120px; 
    		left: 0; 
    		width: 100%; 
    		justify-content: center; 
    		gap: 50px; 
    		z-index: 200;
	}

	.power-bar {
   		width: 80%;
    		height: 10px;
   		border: 1px solid var(--guide-green);
    		margin: 10px auto;
    		position: relative;
	}

	.power-fill {
    		height: 100%;
    		background: var(--guide-green);
    		width: 100%;
    		animation: drain 7s linear forwards;
	}

	@keyframes drain {
    		0% { width: 100%; }
    		25% { width: 30%; }
    		100% { width: 0%; }
	}

	.reroute-text {
    	font-size: 0.8rem;
    	text-align: center;
    	animation: blink 0.4s infinite;
	}

	@keyframes slowBlink {
  	0% { transform: scaleY(1); }
  	45% { transform: scaleY(0.01); background: #000; }
  	55% { transform: scaleY(0.01); background: #000; }
  	100% { transform: scaleY(1); }
	}

	@keyframes drunkWobble {
  	0% { transform: rotate(0deg) scale(1); filter: blur(0px) opacity(1); }
 	25% { transform: rotate(2deg) scale(1.02); filter: blur(1px) opacity(0.8); }
  	50% { transform: rotate(-2deg) scale(0.98); filter: blur(2px) opacity(0.6); }
  	75% { transform: rotate(1deg) scale(1.01); filter: blur(1px) opacity(0.8); }
  	100% { transform: rotate(0deg) scale(1); filter: blur(0px) opacity(1); }
	}

	/* The Panic Strobe */
	@keyframes strobe {
    	0% { background-color: var(--guide-bg); }
    	50% { background-color: #330000; }
    	100% { background-color: var(--guide-bg); }
	}

	/* The Improbability Warp */
	@keyframes warp {
    	0% { transform: scale(1); filter: hue-rotate(0deg); }
    	50% { transform: scale(1.05, 0.95) hue-rotate(90deg); }
    	100% { transform: scale(1); filter: hue-rotate(0deg); }
	}

	/* The Scanline */
	@keyframes scanline {
    	0% { top: 0%; }
    	100% { top: 100%; }
	}

	@keyframes flicker {
  	0% { opacity: 1; }
  	50% { opacity: 0.3; }
  	100% { opacity: 1; }
	}

	@keyframes despair {
  	0% { filter: grayscale(0%); }
  	50% { filter: grayscale(100%); }
  	100% { filter: grayscale(0%); }
	}

	@keyframes glitch {
  	0% { transform: translate(0); }
  	20% { transform: translate(-5px, 5px); }
  	40% { transform: translate(-5px, -5px); }
  	60% { transform: translate(5px, 5px); }
  	80% { transform: translate(5px, -5px); }
  	100% { transform: translate(0); }
	}

	@keyframes fallingPlunge {
    	0% { transform: translateY(0) scale(1); filter: blur(0px); opacity: 1; }
    	30% { transform: translateY(-20px); filter: blur(1px); }
    	100% { transform: translateY(100vh) scale(0.9); filter: blur(8px); opacity: 0; }
	}
	/* Custom terminal style for severe system overrides */
	.system-override {
    	font-family: 'Arial Black', Gadget, sans-serif !important;
    	font-weight: bold;
    	letter-spacing: 2px;
    	line-height: 1.8;
	}


    </style>

<body>

<div id="guide-unit">
    <header>
        <h1>The Hitchhiker's Guide to the Galaxy</h1>
    </header>

</div>

<div id="top-nav">

</div>

    <div id="display-area">
        <div id="content">

            <p>Awaiting Hitchhiker input...</p>
        </div>
    </div>

    <div id="emergency-kit">
    	<button class="nav-btn" onclick="towelAction()">TOWEL</button>
    	<button class="nav-btn" onclick="teaAction()">TEA</button>
</div>

    <div class="footer-nav">
        <button class="nav-btn" onclick="runSync()">SYNC</button>
        <button class="nav-btn" onclick="randomEntry()">RANDOM</button>
        <button class="nav-btn" onclick="runHelp()">HELP</button>
    </div>
</div>

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let typingTimer;
    let audioEnabled = false;

    function clearSearch() {
    document.getElementById('guide-unit').classList.remove('glitch-unit'); 
    hideEmergencyKit();

    // 2. Clear the text and hide suggestions
    const input = document.getElementById('search-input');
    const suggBox = document.getElementById('suggestions');
    input.value = ''; 
    suggBox.style.display = 'none'; 
    
    // 3. Reset the screen back to the "System Ready" message
    const display = document.getElementById('content');
    display.innerHTML = `
        <div class="entry-title">SYSTEM READY</div>
        <p>Awaiting Hitchhiker input...</p>
    `;

    // 4. Put the blinking cursor back in the box
    input.focus(); 

    // Optional: Play a "reset" tone
    if (typeof playTone === "function") playTone(220, 0.1); 
}

    function getBritishVoice() {
        const voices = window.speechSynthesis.getVoices();
        return voices.find(v => v.lang === 'en-GB' && v.name.includes('Google')) || 
               voices.find(v => v.lang === 'en-GB') || 
               voices[0]; 
    }

    function toggleAudio() {
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('voice-btn');
    btn.innerText = `VOICE: ${audioEnabled ? 'ON' : 'OFF'}`;

    if (audioEnabled) {
        btn.classList.add('voice-on');
        speak("Hi There! Please call me Eddie if it will help you to relax.");
        } else {
        btn.classList.remove('voice-on');

        // Create a one-time message that bypasses the audioEnabled check
        const goodbye = new SpeechSynthesisUtterance("it's been real great knowing you guys.");
        
        // Match your Guide's voice settings
        const britishVoice = getBritishVoice();
        if (britishVoice) goodbye.voice = britishVoice;
        goodbye.rate = 0.84;
        goodbye.pitch = 0.70;

        // Tell the browser to speak it
        window.speechSynthesis.speak(goodbye);

        // Wait for the speech to finish, THEN cancel the system
        goodbye.onend = function() {
            window.speechSynthesis.cancel();
        };

    }

}
    function speak(title, content) {
        if (!audioEnabled) return;
        window.speechSynthesis.cancel(); 

        const fullText = `${title}. ... ${content}`;
        const msg = new SpeechSynthesisUtterance(fullText);
        
        const britishVoice = getBritishVoice();
        if (britishVoice) msg.voice = britishVoice;

        msg.rate = 0.87;   
        msg.pitch = 0.75;  
        msg.volume = 1.0;

        window.speechSynthesis.speak(msg);
    }

    window.speechSynthesis.onvoiceschanged = getBritishVoice;

    function playTone(freq, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

// ==========================================
// GLOBAL FUNCTIONS (Outside the Actions object)
// ==========================================

function typeWriter(text, elementId, callback) { 
    let i = 0; 
    const element = document.getElementById(elementId); 
    element.innerHTML = ""; // Clear previous content
    function type() { 
        if (i < text.length) { 
            element.innerHTML += text.charAt(i); 
            i++; 
            typingTimer = setTimeout(type, 20); 
        } else if (callback) {
            callback();
        }
    } 
    type(); 
} 

function selectEntry(key) { 
    if (typeof playTone === "function") playTone(880, 0.1); 
    const inputField = document.getElementById('search-input');
    if (inputField) inputField.value = key; 
    
    const suggBox = document.getElementById('suggestions');
    if (suggBox) suggBox.style.display = 'none'; 
    
    clearTimeout(typingTimer); 
    
    const entry = entries[key]; 
    const display = document.getElementById('content'); 
    
    display.innerHTML = ` 
        <div class="entry-title">${key.toUpperCase()}</div> 
        <div id="guide-body"></div> 
        <div id="actions" style="margin-top:20px; display:flex; flex-direction:column; gap:10px; padding-bottom:50px;"></div> 
    `; 
    
    if (typeof speak === "function") speak(key, entry.text || entry);

    // If entry is an object with custom buttons
    if (entry && entry.text) {
        typeWriter(entry.text, 'guide-body', () => { 
            if (entry.buttons) { 
                const actionDiv = document.getElementById('actions'); 
                entry.buttons.forEach(btn => { 
                    const b = document.createElement('button'); 
                    b.className = 'guide-button'; 
                    b.innerText = btn.label; 
                    b.onclick = () => { 
                        if (btn.link) selectEntry(btn.link); 
                        if (btn.action && typeof btn.action === "function") btn.action(); 
                    }; 
                    actionDiv.appendChild(b); 
                }); 
            } 
        }); 
    } else {
        // If entry is just a plain string
        typeWriter(entry, 'guide-body');
    }
} 

function showSuggestions(val) { 
    const suggBox = document.getElementById('suggestions'); 
    suggBox.innerHTML = ''; 
    if (!val) { 
        suggBox.style.display = 'none'; 
        return; 
    } 
    const matches = Object.keys(entries).filter(k => k.startsWith(val.toLowerCase())); 
    if (matches.length > 0) { 
        suggBox.style.display = 'block'; 
        matches.forEach(m => { 
            const div = document.createElement('div'); 
            div.className = 'suggestion-item'; 
            div.innerText = m; 
            div.onclick = () => selectEntry(m); 
            suggBox.appendChild(div); 
        }); 
    } else { 
        suggBox.style.display = 'none'; 
    } 
} 

function randomEntry() { 
    const keys = Object.keys(entries); 
    selectEntry(keys[Math.floor(Math.random() * keys.length)]); 
} 

function hideEmergencyKit() { 
    const kit = document.getElementById('emergency-kit'); 
    if (kit) kit.style.display = 'none'; 
} // Standard function closing block (no semicolon needed)

function filterByVolume(volumeNumber) {
    // 1. Clear any suggestions that are currently open
    const suggBox = document.getElementById('suggestions');
    if (suggBox) suggBox.style.display = 'none';

    // 2. Filter your entries object to only find matching volumes
    // (Assuming your data object is named 'entries')
    const display = document.getElementById('content');
    display.innerHTML = `<div class="entry-title">VOLUME ${volumeNumber}</div><ul id="volume-list" style="list-style:none; padding:0; display:flex; flex-direction:column; gap:10px;"></ul>`;
    
    const listContainer = document.getElementById('volume-list');
    
    Object.keys(entries).forEach(key => {
        const entry = entries[key];
        // Check if the entry is an object and matches the volume
        if (entry && entry.volume === volumeNumber) {
            const li = document.createElement('li');
            const b = document.createElement('button');
            b.className = 'guide-button';
            b.innerText = key.toUpperCase();
            b.onclick = () => selectEntry(key);
            li.appendChild(b);
            listContainer.appendChild(li);
        }
    });

    // 3. Play a little interface confirmation sound
    if (typeof playTone === "function") playTone(660, 0.15);
    
    // 4. Speak the update if voice is turned on
    if (typeof speak === "function") {
        speak(`Volume ${volumeNumber}`, `Filtering database for entries matching volume ${volumeNumber}.`);
    }
}
